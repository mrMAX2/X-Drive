services:
  # ── Backend API (Now a Web Service to fit Free Tier) ──
  - type: web
    name: backend
    env: docker
    rootDir: backend
    plan: free
    envVars:
      - key: SERVER_PORT
        value: 8080
      - key: PORT
        value: 8080
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        value: https://xdrive-frontend.onrender.com
      - key: MINIO_URL
        value: http://minio-not-configured:9000
      - key: MINIO_ACCESS_KEY
        value: admin
      - key: MINIO_SECRET_KEY
        value: password

  # ── React Frontend (Public Web Service) ──
  - type: web
    name: xdrive-frontend
    env: docker
    rootDir: frontend
    plan: free
    envVars:
      - key: PORT
        value: 80
      - key: BACKEND_HOST
        fromService:
          type: web
          name: backend
          property: host
      - key: BACKEND_PORT
        fromService:
          type: web
          name: backend
          property: port
