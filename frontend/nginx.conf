server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # DNS resolver for cloud networking
    resolver 8.8.8.8 valid=30s;

    # Proxy API calls to Spring Boot backend
    location /api/ {
        # Using the public URL with HTTPS for maximum reliability
        set $backend_upstream "https://backend-lihb.onrender.com";
        proxy_pass $backend_upstream;
        
        proxy_set_header Host backend-lihb.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        
        # Important for SSL proxying
        proxy_ssl_server_name on;
        proxy_set_header Origin https://backend-lihb.onrender.com;
        
        client_max_body_size 100M;
    }

    # React SPA — fallback all routes to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
