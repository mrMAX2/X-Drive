# ── Server ──────────────────────────────────────────────────────────────────
server.port=${SERVER_PORT:8080}

# ── PostgreSQL ───────────────────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/xdrive}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres123}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# ── JWT ──────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:x-drive-super-secret-key-2024-change-this-in-production-min-256-bits}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ── MinIO ────────────────────────────────────────────────────────────────────
minio.url=${MINIO_URL:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
minio.secret-key=${MINIO_SECRET_KEY:minioadmin}
minio.bucket-name=${MINIO_BUCKET:xdrive-files}

# ── File Upload ──────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# ── CORS ─────────────────────────────────────────────────────────────────────
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# ── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.xdrive=INFO
logging.level.org.springframework.security=WARN
